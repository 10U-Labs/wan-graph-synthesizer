---
concurrency:
  cancel-in-progress: false
  group: seed
jobs:
  e2e-tests:
    name: e2e-tests
    needs: integration-tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Install tools
        run: pip install pytest pyyaml
      - name: Run end-to-end tests against a stub API
        run: >-
          PYTHONPATH=.:lib/python:scripts:test
          python3 -m pytest
          test/scripts/seed/e2e/
          --import-mode=importlib --confcutdir=test
          --verbose
  integration-tests:
    name: integration-tests
    needs: unit-tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Install tools
        run: pip install pytest pyyaml
      - name: Run integration tests against a mocked API
        run: >-
          PYTHONPATH=.:lib/python:scripts:test
          python3 -m pytest
          test/scripts/seed/integration/
          --import-mode=importlib --confcutdir=test
          --verbose --pythonwarnings=error
  seeding:
    if: github.ref == 'refs/heads/main'
    name: seeding
    needs: e2e-tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Install tools
        run: pip install pyyaml
      - name: Push the git-authored inputs to the API
        run: PYTHONPATH=lib/python python3 scripts/seed.py
  static-analysis:
    name: static-analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Install tools
        run: |
          pip install \
            assert-no-inline-directives \
            assert-no-linter-config-files \
            assert-one-assert-per-pytest \
            mypy pylint pytest pyyaml types-PyYAML yamllint
          npm install -g jscpd
      - name: Lint YAML
        run: |
          EMPTY='empty-lines: {max: 0, max-start: 0, max-end: 1}'
          KEY='key-ordering: enable'
          LL='line-length: disable'
          NL='new-line-at-end-of-file: enable'
          TR='truthy: {allowed-values: ["true", "false", "on"]}'
          RULES="$EMPTY, $KEY, $LL, $NL, $TR"
          yamllint --strict \
            --config-data \
            "{extends: default, rules: {$RULES}}" \
            .github/workflows/seed.yml
      - name: Assert no inline directives
        run: >-
          assert-no-inline-directives
          --tools pylint,mypy,yamllint
          --verbose
          ${{ github.workspace }}/lib/python ${{ github.workspace }}/scripts ${{ github.workspace }}/test/scripts
      - name: Assert no linter config files
        run: >-
          assert-no-linter-config-files
          --linters pylint,mypy,yamllint
          --verbose
          ${{ github.workspace }}
      - name: Assert one assert per pytest
        run: >-
          assert-one-assert-per-pytest
          --verbose
          ${{ github.workspace }}/test/scripts/seed
      - name: Run pylint on source
        run: >-
          PYTHONPATH=lib/python:scripts
          python3 -m pylint
          scripts/seed.py lib/python/test_http_doubles/
          --fail-on=C,R,W --fail-under=10.0
      - name: Run mypy on source
        run: >-
          MYPYPATH=lib/python:scripts
          python3 -m mypy --strict
          --explicit-package-bases scripts/seed.py lib/python/test_http_doubles/
      - name: Detect copy-paste in source
        run: >-
          jscpd --pattern "**/*.py" --threshold 0 --reporters console
          scripts/seed.py lib/python/test_http_doubles/
      - name: Run pylint on tests
        run: >-
          PYTHONPATH=.:lib/python:scripts:test
          python3 -m pylint --recursive=y
          test/scripts/seed/
          --fail-on=C,R,W --fail-under=10.0
      - name: Run mypy on tests
        run: >-
          MYPYPATH=lib/python:scripts:test
          python3 -m mypy --strict
          --explicit-package-bases test/scripts/seed/
      - name: Detect copy-paste in tests
        run: >-
          jscpd --pattern "test/scripts/seed/**/*.py" --threshold 0
          --reporters console test/scripts/seed/
  unit-tests:
    name: unit-tests
    needs: static-analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Install tools
        run: pip install pytest pytest-cov pyyaml
      - name: Run unit tests with a 100% coverage gate
        run: >-
          PYTHONPATH=.:lib/python:scripts
          python3 -m pytest
          test/scripts/seed/unit/
          --import-mode=importlib --confcutdir=test
          --verbose --pythonwarnings=error
          --cov=seed
          --cov-branch
          --cov-report=term-missing
          --cov-fail-under=100
name: seed
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/seed.yml
      - data/**
      - etc/**
      - lib/python/**
      - scripts/**
      - src/www/api/openapi.json
      - test/scripts/seed/**
  workflow_dispatch: {}
