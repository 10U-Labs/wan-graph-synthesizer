---
concurrency:
  cancel-in-progress: false
  group: build-synthesizer-image
jobs:
  build:
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-2
          role-to-assume: ${{ vars.OIDC_ROLE_ARN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Amazon ECR
        run: |
          aws ecr get-login-password --region us-east-2 \
            | docker login --username AWS --password-stdin \
              781581267945.dkr.ecr.us-east-2.amazonaws.com
      - name: Build and push the synthesizer image (arm64/Graviton)
        run: |
          REPO=781581267945.dkr.ecr.us-east-2.amazonaws.com/wan-graph-synthesizer
          docker buildx build --platform linux/arm64 \
            -f src/api/endpoints/tenants/wan/Dockerfile \
            -t "$REPO:latest" --push .
name: Build synthesizer image
'on':
  push:
    branches: [main]
    paths:
      - src/api/endpoints/tenants/wan/Dockerfile
      - src/api/endpoints/tenants/wan/entrypoint.py
      - src/api/endpoints/tenants/wan/synthesizer/**
  workflow_dispatch: {}
