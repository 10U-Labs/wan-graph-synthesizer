---
concurrency:
  cancel-in-progress: true
  group: etc-${{ github.ref }}
jobs:
  yamllint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Install tools
        run: pip install assert-no-inline-directives yamllint
      - name: Assert no inline directives
        run: >-
          assert-no-inline-directives
          --tools yamllint
          --verbose
          .github/workflows/etc.yml etc/
      - name: Lint YAML
        run: |
          EMPTY='empty-lines: {max: 0, max-start: 0, max-end: 1}'
          KEY='key-ordering: enable'
          LL='line-length: disable'
          NL='new-line-at-end-of-file: enable'
          TR='truthy: {allowed-values: ["true", "false", "on"]}'
          RULES="$EMPTY, $KEY, $LL, $NL, $TR"
          yamllint --strict \
            --config-data \
            "{extends: default, rules: {$RULES}}" \
            .github/workflows/etc.yml etc/joint.yml \
            etc/f_35_non_redundant.yml etc/f_35_redundant.yml
name: etc
on:
  pull_request:
    paths:
      - .github/workflows/etc.yml
      - etc/**
  push:
    branches: [main]
    paths:
      - .github/workflows/etc.yml
      - etc/**
  workflow_dispatch:
