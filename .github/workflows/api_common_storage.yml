---
concurrency:
  cancel-in-progress: false
  group: api-common-storage-${{ github.ref }}
jobs:
  reconcile:
    if: github.ref == 'refs/heads/main'
    name: Reconcile API common storage
    needs: static-analysis
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-2
          role-to-assume: ${{ vars.OIDC_ROLE_ARN }}
      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false
      - name: Reconcile the stack to its declared state
        run: |
          tofu -chdir=src/api/common/storage init -input=false
          tofu -chdir=src/api/common/storage apply -auto-approve -input=false
  static-analysis:
    name: Static analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Install tools
        run: pip install yamllint
      - name: Lint YAML
        run: |
          EMPTY='empty-lines: {max: 0, max-start: 0, max-end: 1}'
          KEY='key-ordering: enable'
          LL='line-length: disable'
          NL='new-line-at-end-of-file: enable'
          TR='truthy: {allowed-values: ["true", "false", "on"]}'
          RULES="$EMPTY, $KEY, $LL, $NL, $TR"
          yamllint --strict \
            --config-data \
            "{extends: default, rules: {$RULES}}" \
            .github/workflows/api_common_storage.yml
      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false
      - name: Validate the stack
        run: |
          tofu -chdir=src/api/common/storage init -backend=false -input=false
          tofu -chdir=src/api/common/storage validate
name: API common storage
on:
  push:
    branches: [main]
    paths:
      - src/api/common/storage/**
      - lib/opentofu/common/**
      - .github/workflows/api_common_storage.yml
  workflow_dispatch: {}
