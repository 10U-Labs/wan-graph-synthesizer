---
concurrency:
  cancel-in-progress: false
  group: api-endpoint-csps-${{ github.ref }}
jobs:
  post-deployment-integration-test:
    if: github.ref == 'refs/heads/main'
    name: post-deployment-integration-test
    needs: reconcile
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-2
          role-to-assume: ${{ vars.OIDC_ROLE_ARN }}
      - name: Install tools
        run: pip install boto3 boto3-stubs pytest 'python-hcl2<8'
      - name: Run post-deployment integration tests against live AWS
        run: >-
          PYTHONPATH=.:lib/python
          python3 -m pytest
          test/api/endpoints/csps/post_deployment/integration/
          --import-mode=importlib --confcutdir=test
          --verbose
  pre-deployment-integration-test:
    if: github.ref == 'refs/heads/main'
    name: pre-deployment-integration-test
    needs: unit-test
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-2
          role-to-assume: ${{ vars.OIDC_ROLE_ARN }}
      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false
      - name: Install tools
        run: pip install boto3 boto3-stubs pytest 'python-hcl2<8'
      - name: Initialize the stack for state inspection
        run: tofu -chdir=src/api/endpoints/csps init -input=false
      - name: Run pre-deployment integration tests
        run: >-
          PYTHONPATH=.:lib/python
          python3 -m pytest
          test/api/endpoints/csps/pre_deployment/integration/
          --import-mode=importlib --confcutdir=test
          --verbose
  reconcile:
    if: github.ref == 'refs/heads/main'
    name: reconcile
    needs: pre-deployment-integration-test
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-2
          role-to-assume: ${{ vars.OIDC_ROLE_ARN }}
      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false
      - name: Reconcile the stack to its declared state
        run: |
          tofu -chdir=src/api/endpoints/csps init -input=false
          tofu -chdir=src/api/endpoints/csps apply -auto-approve -input=false
  static-analysis:
    name: static-analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Install tools
        run: |
          pip install \
            assert-no-inline-directives \
            assert-no-linter-config-files \
            assert-one-assert-per-pytest \
            boto3 boto3-stubs botocore-stubs mypy pylint pytest \
            'python-hcl2<8' pyyaml types-PyYAML yamllint
          npm install -g jscpd
      - name: Lint YAML
        run: |
          EMPTY='empty-lines: {max: 0, max-start: 0, max-end: 1}'
          KEY='key-ordering: enable'
          LL='line-length: disable'
          NL='new-line-at-end-of-file: enable'
          TR='truthy: {allowed-values: ["true", "false", "on"]}'
          RULES="$EMPTY, $KEY, $LL, $NL, $TR"
          yamllint --strict \
            --config-data \
            "{extends: default, rules: {$RULES}}" \
            .github/workflows/api_endpoint_csps.yml
      - name: Assert no inline directives
        run: >-
          assert-no-inline-directives
          --tools pylint,mypy,yamllint
          --verbose
          ${{ github.workspace }}/lib/python
          ${{ github.workspace }}/src/api/endpoints/csps/lambdas
          ${{ github.workspace }}/test/api/endpoints/csps
      - name: Assert no linter config files
        run: >-
          assert-no-linter-config-files
          --linters pylint,mypy,yamllint
          --verbose
          ${{ github.workspace }}
      - name: Assert one assert per pytest
        run: >-
          assert-one-assert-per-pytest
          --verbose
          ${{ github.workspace }}/test/api/endpoints/csps/conftest.py
          ${{ github.workspace }}/test/api/endpoints/csps/pre_deployment
          ${{ github.workspace }}/test/api/endpoints/csps/post_deployment
      - name: Run pylint on source
        run: >-
          PYTHONPATH=lib/python:src/api/endpoints/csps/lambdas
          python3 -m pylint
          src/api/endpoints/csps/lambdas/handler.py
          lib/python/test_terraform_config
          lib/python/test_terraform_drift
          lib/python/test_fixtures
          --fail-on=C,R,W --fail-under=10.0
      - name: Run mypy on source
        run: >-
          MYPYPATH=lib/python:src/api/endpoints/csps/lambdas
          python3 -m mypy --strict --explicit-package-bases
          --ignore-missing-imports
          src/api/endpoints/csps/lambdas/handler.py
          lib/python/test_terraform_config
          lib/python/test_terraform_drift
          lib/python/test_fixtures
      - name: Detect copy-paste in source
        run: >-
          jscpd --pattern "**/*.py" --threshold 0 --reporters console
          src/api/endpoints/csps/lambdas
          lib/python/test_terraform_config
          lib/python/test_terraform_drift
          lib/python/test_fixtures
      - name: Run pylint on tests
        run: >-
          PYTHONPATH=.:lib/python:src/api/endpoints/csps/lambdas
          python3 -m pylint --recursive=y
          test/api/endpoints/csps/conftest.py
          test/api/endpoints/csps/pre_deployment
          test/api/endpoints/csps/post_deployment
          --fail-on=C,R,W --fail-under=10.0
      - name: Run mypy on tests
        run: >-
          MYPYPATH=lib/python:src/api/endpoints/csps/lambdas
          python3 -m mypy --strict --explicit-package-bases
          --ignore-missing-imports
          test/api/endpoints/csps/conftest.py
          test/api/endpoints/csps/pre_deployment
          test/api/endpoints/csps/post_deployment
      - name: Detect copy-paste in tests
        run: >-
          jscpd --pattern "test/api/endpoints/csps/**/*.py" --threshold 0
          --reporters console
          test/api/endpoints/csps/
      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false
      - name: Validate the stack
        run: |
          tofu -chdir=src/api/endpoints/csps init -backend=false -input=false
          tofu -chdir=src/api/endpoints/csps validate
  unit-test:
    name: unit-test
    needs: static-analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Install tools
        run: pip install boto3 boto3-stubs pytest pytest-cov 'python-hcl2<8' pyyaml
      - name: Run unit tests with a 100% coverage gate
        run: >-
          PYTHONPATH=.:lib/python:src/api/endpoints/csps/lambdas
          python3 -m pytest
          test/api/endpoints/csps/pre_deployment/unit/
          --import-mode=importlib --confcutdir=test
          --verbose --pythonwarnings=error
          --cov=src/api/endpoints/csps/lambdas
          --cov-branch
          --cov-report=term-missing
          --cov-fail-under=100
name: api_endpoint_csps
on:
  push:
    branches: [main]
    paths:
      - src/api/endpoints/csps/**
      - test/api/endpoints/csps/**
      - lib/python/**
      - lib/opentofu/common/**
      - .github/workflows/api_endpoint_csps.yml
  workflow_dispatch: {}
