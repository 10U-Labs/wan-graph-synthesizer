---
concurrency:
  cancel-in-progress: true
  group: design-${{ github.head_ref || github.ref_name }}
jobs:
  e2e-test:
    needs: integration-test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Restore pip cache
        uses: actions/cache@v5
        with:
          key: >-
            pip-design-test-${{ hashFiles('.github/workflows/wan_graph_designer.yml') }}
          path: ~/.cache/pip
          restore-keys: |
            pip-design-test-
      - name: Install tools
        run: pip install fastapi httpx2 pytest pyyaml
      - name: Run e2e tests
        run: >-
          PYTHONPATH=.:lib/python:src python3 -m pytest
          test/e2e/ --verbose --pythonwarnings=error
  integration-test:
    needs: unit-test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Restore pip cache
        uses: actions/cache@v5
        with:
          key: >-
            pip-design-test-${{ hashFiles('.github/workflows/wan_graph_designer.yml') }}
          path: ~/.cache/pip
          restore-keys: |
            pip-design-test-
      - name: Install tools
        run: pip install fastapi httpx2 pytest pyyaml
      - name: Run integration tests
        run: >-
          PYTHONPATH=.:lib/python:src python3 -m pytest
          test/integration/ --verbose --pythonwarnings=error
  static-analysis:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Restore pip cache
        uses: actions/cache@v5
        with:
          key: >-
            pip-design-static-${{ hashFiles('.github/workflows/wan_graph_designer.yml') }}
          path: ~/.cache/pip
          restore-keys: |
            pip-design-static-
      - name: Install tools
        run: |
          pip install \
            assert-no-inline-directives \
            assert-no-linter-config-files \
            assert-one-assert-per-pytest \
            boto3 boto3-stubs fastapi httpx2 mypy pylint pytest pyyaml types-PyYAML uvicorn yamllint
          npm install -g jscpd
      - name: Lint YAML
        run: |
          EMPTY='empty-lines: {max: 0, max-start: 0, max-end: 1}'
          KEY='key-ordering: enable'
          LL='line-length: disable'
          NL='new-line-at-end-of-file: enable'
          TR='truthy: {allowed-values: ["true", "false", "on"]}'
          RULES="$EMPTY, $KEY, $LL, $NL, $TR"
          yamllint --strict \
            --config-data \
            "{extends: default, rules: {$RULES}}" \
            .github/workflows/wan_graph_designer.yml
      - name: Assert no inline directives
        run: >-
          assert-no-inline-directives
          --tools pylint,mypy,yamllint
          --verbose
          ${{ github.workspace }}/lib/python ${{ github.workspace }}/src ${{ github.workspace }}/test
      - name: Assert no linter config files
        run: >-
          assert-no-linter-config-files
          --linters pylint,mypy,yamllint
          --verbose
          ${{ github.workspace }}
      - name: Assert one assert per pytest
        run: >-
          assert-one-assert-per-pytest
          --verbose
          ${{ github.workspace }}/test
      - name: Run pylint on source
        run: >-
          PYTHONPATH=.:lib/python:src python3 -m pylint
          lib/python/wan_designer/ src/api/ src/serve.py
          --fail-on=C,R,W --fail-under=10.0
      - name: Run pylint on tests
        run: >-
          PYTHONPATH=.:lib/python:src:test python3 -m pylint --recursive=y
          test/
          --fail-on=C,R,W --fail-under=10.0
      - name: Run mypy on source
        run: >-
          MYPYPATH=lib/python:src python3 -m mypy --strict
          --explicit-package-bases lib/python/ src/
      - name: Run mypy on tests
        run: >-
          MYPYPATH=lib/python:src:test python3 -m mypy --strict
          --explicit-package-bases test/
      - name: Detect copy-paste in source
        run: >-
          jscpd --pattern "**/*.py" --threshold 0
          --reporters console lib/python/ src/
      - name: Detect copy-paste in tests
        run: >-
          jscpd --pattern "test/**/*.py" --threshold 0
          --reporters console test/
  unit-test:
    needs: static-analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Restore pip cache
        uses: actions/cache@v5
        with:
          key: >-
            pip-design-test-${{ hashFiles('.github/workflows/wan_graph_designer.yml') }}
          path: ~/.cache/pip
          restore-keys: |
            pip-design-test-
      - name: Install tools
        run: pip install boto3 fastapi httpx2 pytest pytest-cov pyyaml
      - name: Run unit tests with a 100% coverage gate
        run: >-
          PYTHONPATH=.:lib/python:src python3 -m pytest
          test/unit/ --verbose --pythonwarnings=error
          --cov=wan_designer
          --cov=api
          --cov-branch
          --cov-report=term-missing
          --cov-fail-under=100
name: wan-graph-designer
on:
  pull_request:
    paths:
      - .github/workflows/wan_graph_designer.yml
      - data/**
      - lib/**
      - requirements.txt
      - src/**
      - test/**
  push:
    branches: [main]
    paths:
      - .github/workflows/wan_graph_designer.yml
      - data/**
      - lib/**
      - requirements.txt
      - src/**
      - test/**
  workflow_dispatch:
