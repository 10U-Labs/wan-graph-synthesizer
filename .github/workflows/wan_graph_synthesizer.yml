---
concurrency:
  cancel-in-progress: true
  group: design-${{ github.head_ref || github.ref_name }}
jobs:
  integration-test:
    needs: unit-test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Restore pip cache
        uses: actions/cache@v5
        with:
          key: >-
            pip-design-test-${{ hashFiles('.github/workflows/wan_graph_synthesizer.yml') }}
          path: ~/.cache/pip
          restore-keys: |
            pip-design-test-
      - name: Install tools
        run: pip install pytest pyyaml
      - name: Run integration tests
        run: >-
          PYTHONPATH=.:lib/python:scripts:src:src/api/endpoints/tenants/wan
          python3 -m pytest
          test/lib/python/synthesizer/integration/
          --verbose --pythonwarnings=error
  static-analysis:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Restore pip cache
        uses: actions/cache@v5
        with:
          key: >-
            pip-design-static-${{ hashFiles('.github/workflows/wan_graph_synthesizer.yml') }}
          path: ~/.cache/pip
          restore-keys: |
            pip-design-static-
      - name: Install tools
        run: |
          pip install \
            assert-no-inline-directives \
            assert-no-linter-config-files \
            assert-one-assert-per-pytest \
            boto3 boto3-stubs mypy pylint pytest pyyaml types-PyYAML yamllint
          npm install -g jscpd
      - name: Lint YAML
        run: |
          EMPTY='empty-lines: {max: 0, max-start: 0, max-end: 1}'
          KEY='key-ordering: enable'
          LL='line-length: disable'
          NL='new-line-at-end-of-file: enable'
          TR='truthy: {allowed-values: ["true", "false", "on"]}'
          RULES="$EMPTY, $KEY, $LL, $NL, $TR"
          yamllint --strict \
            --config-data \
            "{extends: default, rules: {$RULES}}" \
            .github/workflows/wan_graph_synthesizer.yml
      - name: Assert no inline directives
        run: >-
          assert-no-inline-directives
          --tools pylint,mypy,yamllint
          --verbose
          ${{ github.workspace }}/lib/python ${{ github.workspace }}/src ${{ github.workspace }}/test
      - name: Assert no linter config files
        run: >-
          assert-no-linter-config-files
          --linters pylint,mypy,yamllint
          --verbose
          ${{ github.workspace }}
      - name: Assert one assert per pytest
        run: >-
          assert-one-assert-per-pytest
          --verbose
          ${{ github.workspace }}/test
      - name: Run pylint on source
        run: >-
          PYTHONPATH=.:lib/python:scripts:src:src/api/endpoints/tenants/wan
          python3 -m pylint
          src/api/
          src/api/endpoints/tenants/wan/synthesizer/
          --fail-on=C,R,W --fail-under=10.0
      - name: Run pylint on tests
        run: >-
          PYTHONPATH=.:lib/python:scripts:src:test:src/api/endpoints/tenants/wan
          python3 -m pylint --recursive=y
          test/
          --fail-on=C,R,W --fail-under=10.0
      - name: Run mypy on source
        run: >-
          MYPYPATH=lib/python:scripts:src:src/api/endpoints/tenants/wan
          python3 -m mypy --strict
          --explicit-package-bases lib/python/ src/
      - name: Run mypy on tests
        run: >-
          MYPYPATH=lib/python:scripts:src:test:src/api/endpoints/tenants/wan
          python3 -m mypy --strict
          --explicit-package-bases test/
      - name: Detect copy-paste in source
        run: |
          jscpd --pattern "**/*.py" --threshold 0 --reporters console \
            --ignore "src/api/endpoints/**/lambdas/**" lib/python/ src/
          for handler in $(find src/api/endpoints -type d -name lambdas); do
            jscpd --pattern "**/*.py" --threshold 0 --reporters console \
              lib/python/ "$handler"
          done
      - name: Detect copy-paste in tests
        run: >-
          jscpd --pattern "test/**/*.py" --threshold 0 --reporters console
          --ignore "test/**/test_endpoint_handlers.py" test/
  terraform:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
      - name: Validate every stack
        run: |
          export TF_PLUGIN_CACHE_DIR=/tmp/tofu-plugins
          mkdir -p "$TF_PLUGIN_CACHE_DIR"
          for dir in $(find src -name backend.tf | xargs -n1 dirname | sort -u); do
            echo "== $dir =="
            tofu -chdir="$dir" init -backend=false -input=false
            tofu -chdir="$dir" validate
          done
  unit-test:
    needs: static-analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Restore pip cache
        uses: actions/cache@v5
        with:
          key: >-
            pip-design-test-${{ hashFiles('.github/workflows/wan_graph_synthesizer.yml') }}
          path: ~/.cache/pip
          restore-keys: |
            pip-design-test-
      - name: Install tools
        run: pip install boto3 pytest pytest-cov pyyaml
      - name: Run unit tests with a 100% coverage gate
        run: >-
          PYTHONPATH=.:lib/python:scripts:src:src/api/endpoints/tenants/wan
          python3 -m pytest
          test/lib/python/synthesizer/unit/ test/src/api/unit/
          --verbose --pythonwarnings=error
          --cov=synthesizer
          --cov=api
          --cov-branch
          --cov-report=term-missing
          --cov-fail-under=100
name: wan-graph-synthesizer
on:
  pull_request:
    paths:
      - .github/workflows/wan_graph_synthesizer.yml
      - data/**
      - lib/**
      - src/**
      - test/**
  push:
    branches: [main]
    paths:
      - .github/workflows/wan_graph_synthesizer.yml
      - data/**
      - lib/**
      - src/**
      - test/**
  workflow_dispatch:
