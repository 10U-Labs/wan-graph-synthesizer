---
# F-35-only WAN design: demand is F-35 installations only (no AFLCMC/AFNWC/NI).
# Keys are kept alphabetical within each block to satisfy yamllint key-ordering.
access_homing_degree: 2
backbone_mesh_degree: 3
backbone_node_count:
  max: 99
  min: 3
forced_backbone_nodes:
  - Atlanta, GA
  - Las Vegas, NV
  - Los Angeles, CA
forced_connections: []
inputs:
  csps:
    AWS:
      - data/vertices/csps/aws/aws_govcloud.csv
      - data/vertices/csps/aws/aws_secret_east.csv
      - data/vertices/csps/aws/aws_secret_west.csv
      - data/vertices/csps/aws/aws_top_secret_east.csv
      - data/vertices/csps/aws/aws_top_secret_west.csv
    Azure:
      - data/vertices/csps/azure/azure_secret_east.csv
      - data/vertices/csps/azure/azure_secret_west.csv
  locations:
    F-35: data/vertices/tenants/f_35.csv
  off_net: data/vertices/utilities/off_net.csv
knobs:
  backbone_set_peak_bytes: 160
  compass_octants: 8
  enum_memory_fraction: 0.6
label: F-35 (redundant)
prohibited_backbone_nodes: []
prohibited_connections: []
