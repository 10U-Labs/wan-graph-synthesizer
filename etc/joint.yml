---
# Canonical three-tier WAN design configuration. Operator choices live here, not
# in source: change the design by editing this file. CLI flags override these.
# Keys are kept alphabetical within each block to satisfy yamllint key-ordering.
design:
  # Allow mapbook ROADM vertices to be selected as aggregation/core points.
  allow_roadm_aggregation: false
  # PoPs barred from every selected role.
  excluded: []
  # Core-core mesh links the operator prunes from the full backbone mesh. Both
  # endpoints must be forced cores. (type defaults to core-core, the only kind a
  # link can be removed as.)
  excluded_connections:
    - source: Los Angeles, CA
      target: Dulles, VA
  # PoPs pinned into the aggregation tier -- all carrier municipalities, never
  # installations. Richmond is pinned (not Norfolk, a single-homed ROADM leaf) so
  # southeast-Virginia demand homes into a PoP that can dual-home to two cores.
  # Cheyenne, Great Falls, and Minot are the municipalities nearest the three ICBM
  # wings (F.E. Warren, Malmstrom, Minot AFB): forcing the carrier PoP gives each
  # wing's demand a local aggregation while the installation itself stays demand --
  # to instead force a base as an aggregation, name the installation here. Great
  # Falls and Minot are ROADMs, so pinning them overrides allow_roadm_aggregation.
  forced_aggregations:
    - Cheyenne, WY
    - Chicago, IL
    - Dallas, TX
    - Dulles, VA
    - Great Falls, MT
    - Las Vegas, NV
    - Los Angeles, CA
    - Manassas, VA
    - Minot, ND
    - New York, NY
    - Portland, OR
    - Salt Lake City, UT
    - San Antonio, TX
    - Tallahassee, FL
  # Operator-forced edges pinned into the design, keyed by source, target, and the
  # edge type (core-core, aggregation-core, or access-aggregation). Each endpoint
  # must already be pinned into the tier its edge type requires.
  forced_connections:
    - source: Minot, ND
      target: Salt Lake City, UT
      type: aggregation-core
    - source: Hanscom AFB
      target: New York, NY
      type: access-aggregation
    - source: Burlington ANGB
      target: New York, NY
      type: access-aggregation
    - source: F.E. Warren AFB
      target: Salt Lake City, UT
      type: access-aggregation
  # PoPs pinned into the core tier. The search may still add cores past these to
  # satisfy min_core_count and coverage, but never drops a pinned one.
  forced_cores:
    - Dallas, TX
    - Dulles, VA
    - Los Angeles, CA
    - Salt Lake City, UT
  # Maximum number of core PoPs. Coverage growth past the floor never seats more
  # cores than this ceiling, so the backbone stays bounded.
  max_core_count: 5
  # Minimum number of core PoPs. The search adds more cores only when feasibility
  # requires it; it never drops below this floor.
  min_core_count: 3
  # PoPs barred from the aggregation tier yet still eligible as cores (unlike
  # `excluded`, which bars every role). Empty: every forced core is now also
  # dual-roled as a co-located aggregation, so none are aggregation-barred.
  prohibited_aggregations: []
  # Add extra physical Carrier edges to reduce articulation or degree risk.
  resilience_augmentation: true
inputs:
  # Physical Lumen backbone edges between carrier PoPs.
  carrier_edges: data/edges/lumen.csv
  # Off-net seats: non-PoP locations the operator may force as cores/aggregations,
  # reached by synthetic local fiber to the nearest carrier PoPs. Dulles lives here.
  off_net: data/vertices/off_net.csv
  # Regional carrier (DCN, VisionNet) backbone edges stitched onto Lumen.
  regional_edges:
    - data/edges/dcn.csv
    - data/edges/vision_net.csv
  # Vertices split into one CSV per tenant; the tenant is the mapping key
  # (the per-tenant CSVs carry no tenant column).
  vertices:
    AFLCMC: data/vertices/aflcmc.csv
    AFNWC/NI: data/vertices/afnwc_ni.csv
    AWS:
      - data/vertices/aws_govcloud.csv
      - data/vertices/aws_secret_east.csv
      - data/vertices/aws_top_secret_east.csv
    Azure:
      - data/vertices/azure_secret_east.csv
      - data/vertices/azure_secret_west.csv
    DCN: data/vertices/dcn.csv
    F-35: data/vertices/f_35.csv
    Lumen: data/vertices/lumen.csv
    OCI: data/vertices/oci_east.csv
    VisionNet: data/vertices/vision_net.csv
# Display label surfaced by the REST API's /api/wan-maps endpoint.
label: Joint
tuning:
  # Aggregation facilities every access vertex homes to (its redundancy level). The
  # design fails validation if any access vertex reaches fewer than this many.
  access_aggregation_links: 2
  # Ceiling (miles) on the data-derived DBSCAN cluster radius. Set above the data's
  # natural k-distance elbow (~459 mi) so the cap does not bind: clusters stay sparse
  # and nearby installations fold into the big metro clusters rather than splitting
  # off their own small heads (e.g. Tulsa, Corpus Christi).
  cluster_max_radius_miles: 500.0
  # A cluster needs at least this many close access vertices to seed an aggregation.
  cluster_min_points: 2
  # Floor (miles) on the data-derived DBSCAN cluster radius.
  cluster_min_radius_miles: 0.0
  # Compass sectors used to score a core's link spread.
  compass_octants: 8
  # How many other cores each core wires to on the backbone: every core links to
  # this many of its nearest reachable cores.
  core_links_per_core: 3
  # Grow the core tier past min_core_count until every aggregation is within this
  # straight-line distance of a core (extra cores are added only where they bring
  # demand meaningfully closer). Raise it for fewer, farther cores; lower it for more.
  core_coverage_target_miles: 600.0
  # Peak bytes one enumerated core set costs (sizes the search to free RAM).
  core_set_peak_bytes: 160
  # Share of RAM the core enumeration may use at its peak.
  enum_memory_fraction: 0.6
