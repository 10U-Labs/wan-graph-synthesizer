---
# Canonical three-tier WAN design. Operator choices live here, not in source.
# Keys are kept alphabetical within each block to satisfy yamllint key-ordering.
# The three redundancy degrees are required; carriers come from the merged substrate.
access_homing_degree: 2
aggregation_homing_degree: 2
core_mesh_degree: 3
core_node_count:
  max: 5
  min: 3
forced_aggregation_points:
  - Cheyenne, WY
  - Chicago, IL
  - Dallas, TX
  - Dulles, VA
  - Great Falls, MT
  - Las Vegas, NV
  - Los Angeles, CA
  - Manassas, VA
  - Minot, ND
  - New York, NY
  - Portland, OR
  - Salt Lake City, UT
  - San Antonio, TX
  - Tallahassee, FL
forced_connections:
  - source: Minot, ND
    target: Salt Lake City, UT
    type: aggregation-core
  - source: Hanscom AFB
    target: New York, NY
    type: access-aggregation
  - source: Burlington ANGB
    target: New York, NY
    type: access-aggregation
  - source: F.E. Warren AFB
    target: Salt Lake City, UT
    type: access-aggregation
forced_core_nodes:
  - Dallas, TX
  - Dulles, VA
  - Los Angeles, CA
  - Salt Lake City, UT
inputs:
  csps:
    AWS:
      - data/vertices/csps/aws/aws_govcloud.csv
      - data/vertices/csps/aws/aws_secret_east.csv
      - data/vertices/csps/aws/aws_top_secret_east.csv
    Azure:
      - data/vertices/csps/azure/azure_secret_east.csv
      - data/vertices/csps/azure/azure_secret_west.csv
    OCI: data/vertices/csps/oci/oci_east.csv
  locations:
    AFLCMC: data/vertices/customers/aflcmc.csv
    AFNWC/NI: data/vertices/customers/afnwc_ni.csv
    F-35: data/vertices/customers/f_35.csv
  off_net: data/vertices/utilities/off_net.csv
knobs:
  cluster_max_radius_miles: 500.0
  cluster_min_points: 2
  cluster_min_radius_miles: 0.0
  compass_octants: 8
  core_coverage_target_miles: 600.0
  core_set_peak_bytes: 160
  enum_memory_fraction: 0.6
label: Joint
prohibited_aggregation_points: []
prohibited_connections: []
prohibited_core_nodes: []
