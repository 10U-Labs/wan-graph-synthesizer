---
# Canonical two-tier WAN design. Operator choices live here, not in source.
# Keys are kept alphabetical within each block to satisfy yamllint key-ordering.
# The two redundancy degrees are required; carriers come from the merged substrate.
access_homing_degree: 2
backbone_mesh_degree: 3
backbone_node_count:
  max: 99
  min: 3
forced_backbone_nodes:
  - Cheyenne, WY
  - Chicago, IL
  - Dallas, TX
  - Great Falls, MT
  - Las Vegas, NV
  - Los Angeles, CA
  - New York, NY
  - Salt Lake City, UT
forced_connections:
  - source: Hanscom AFB
    target: New York, NY
    type: access-backbone
  - source: Burlington ANGB
    target: New York, NY
    type: access-backbone
  - source: F.E. Warren AFB
    target: Salt Lake City, UT
    type: access-backbone
inputs:
  csps:
    AWS:
      - data/vertices/csps/aws/aws_govcloud.csv
      - data/vertices/csps/aws/aws_secret_east.csv
      - data/vertices/csps/aws/aws_top_secret_east.csv
    Azure:
      - data/vertices/csps/azure/azure_secret_east.csv
      - data/vertices/csps/azure/azure_secret_west.csv
    OCI: data/vertices/csps/oci/oci_east.csv
  locations:
    AFLCMC: data/vertices/tenants/aflcmc.csv
    AFNWC/NI: data/vertices/tenants/afnwc_ni.csv
    F-35: data/vertices/tenants/f_35.csv
  off_net: data/vertices/utilities/off_net.csv
knobs:
  backbone_coverage_target_miles: 600.0
  backbone_set_peak_bytes: 160
  compass_octants: 8
  enum_memory_fraction: 0.6
label: Joint
prohibited_backbone_nodes: []
prohibited_connections: []
