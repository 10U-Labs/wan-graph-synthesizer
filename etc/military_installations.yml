---
# Military-installations WAN design across every carrier's fiber.
# Keys are kept alphabetical within each block to satisfy yamllint key-ordering.
access_homing_degree: 2
aggregation_homing_degree: 2
core_mesh_degree: 3
core_node_count:
  max: 11
  min: 11
forced_aggregation_points:
  - Cheyenne, WY
  - Dulles, VA
  - Great Falls, MT
  - Los Angeles, CA
  - Minot, ND
  - New York, NY
  - Portland, OR
  - Salt Lake City, UT
  - Virginia Beach, VA
forced_connections: []
forced_core_nodes:
  - Cheyenne, WY
  - Dulles, VA
  - Los Angeles, CA
  - Salt Lake City, UT
inputs:
  csps:
    AWS:
      - data/vertices/csps/aws/aws_govcloud.csv
      - data/vertices/csps/aws/aws_secret_east.csv
      - data/vertices/csps/aws/aws_secret_west.csv
      - data/vertices/csps/aws/aws_top_secret_east.csv
      - data/vertices/csps/aws/aws_top_secret_west.csv
    Azure:
      - data/vertices/csps/azure/azure_secret_east.csv
      - data/vertices/csps/azure/azure_secret_west.csv
    OCI:
      - data/vertices/csps/oci/oci_east.csv
      - data/vertices/csps/oci/oci_west.csv
  locations:
    Military Installations: data/vertices/tenants/military_installations.csv
  off_net: data/vertices/utilities/off_net.csv
knobs:
  cluster_max_radius_miles: 150.0
  cluster_min_points: 2
  cluster_min_radius_miles: 0.0
  compass_octants: 8
  core_coverage_target_miles: 200.0
  core_set_peak_bytes: 160
  enum_memory_fraction: 0.6
label: Military Installations
prohibited_aggregation_points: []
prohibited_connections: []
prohibited_core_nodes: []
