tuning:
  access_aggregation_links: 2
  # Continent-bridge guard (miles) on a mutual k-NN cluster link, not a tuning
  # dial: above the spread-out regional groups (the Kansas City bases link at
  # ~105 mi) yet well below cross-region distances, so far-flung metros never fuse.
  cluster_max_radius_miles: 150.0
  cluster_min_points: 2
  cluster_min_radius_miles: 0.0
  compass_octants: 8
  core_coverage_target_miles: 200.0
  core_links_per_core: 5
  core_set_peak_bytes: 160
  enum_memory_fraction: 0.6
