---
# F-35-only WAN design, single-homed: each access node homes to one aggregation and
# each aggregation to one core (homing degrees of 1), unlike the redundant variant.
# Keys are kept alphabetical within each block to satisfy yamllint key-ordering.
access_homing_degree: 1
aggregation_homing_degree: 1
core_mesh_degree: 3
core_node_count:
  max: 3
  min: 3
forced_aggregation_points:
  - Dulles, VA
  - Los Angeles, CA
  - Tallahassee, FL
forced_connections: []
forced_core_nodes:
  - Dulles, VA
  - Los Angeles, CA
  - Tallahassee, FL
inputs:
  csps:
    AWS:
      - data/vertices/csps/aws/aws_secret_east.csv
    Azure:
      - data/vertices/csps/azure/azure_secret_east.csv
  locations:
    F-35: data/vertices/customers/f_35.csv
  off_net: data/vertices/utilities/off_net.csv
knobs:
  cluster_max_radius_miles: 250.0
  cluster_min_points: 2
  cluster_min_radius_miles: 0.0
  compass_octants: 8
  core_set_peak_bytes: 160
  enum_memory_fraction: 0.6
label: F-35 (non-redundant)
prohibited_aggregation_points: []
prohibited_connections: []
prohibited_core_nodes: []
